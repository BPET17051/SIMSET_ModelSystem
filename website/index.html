<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>SIMSET Borrow - รายการอุปกรณ์</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/simset-borrow.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container px-4 px-lg-5">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
          <span class="sb-logo-mark">S</span>
          <span class="sb-brand-text">SIMSET Borrow</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
            <li class="nav-item"><a class="nav-link" href="index.html">หน้าหลัก</a></li>
            <li class="nav-item"><a class="nav-link active" href="index.html">รายการอุปกรณ์</a></li>
            <li class="nav-item"><a class="nav-link" href="track.html">ติดตามคำขอ</a></li>
            <li class="nav-item"><a class="nav-link" href="history.html">ประวัติ</a></li>
          </ul>
          <a class="btn btn-brand btn-sm" href="cart.html">
            <i class="bi-cart-fill me-1"></i>รายการยืม
            <span class="btn-brand-badge ms-1" data-cart-count>0</span>
          </a>
        </div>
      </div>
    </nav>
    <header class="hero-borrow">
      <div class="container px-4 px-lg-5 py-5">
        <h1 class="display-5 fw-bolder text-white mb-2">ระบบยืม-คืนอุปกรณ์การแพทย์จำลอง</h1>
        <p class="text-white-50 mb-4">คณะพยาบาลศาสตร์ มหาวิทยาลัยมหิดล</p>
        <div class="sb-hero-search">
          <input id="catalog-search" class="form-control" type="search" placeholder="ค้นหาอุปกรณ์ เช่น หุ่น, CPR, สายสวน...">
          <button class="btn btn-brand" type="button" id="hero-search-btn">ค้นหา</button>
        </div>
      </div>
    </header>
    <section class="py-3 border-bottom">
      <div class="container px-4 px-lg-5">
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <span class="text-muted small fw-semibold">ประเภท:</span>
          <div class="sb-filter-pills" id="catalog-filter">
            <button class="sb-pill active" data-type="all">ทั้งหมด</button>
            <button class="sb-pill" data-type="ผู้ใหญ่">ผู้ใหญ่</button>
            <button class="sb-pill" data-type="เด็ก">เด็ก</button>
            <button class="sb-pill" data-type="ทารก">ทารก</button>
            <button class="sb-pill" data-type="ทั่วไป">ทั่วไป</button>
          </div>
          <span id="catalog-count" class="text-muted small ms-auto text-nowrap"></span>
        </div>
        <p class="recognition-hint catalog-recognition-hint mt-3 mb-0">
          ดูชื่ออุปกรณ์และจำนวนพร้อมยืมได้ทันที ถ้าต้องดูข้อมูลเพิ่มเติมให้กด "ดูรายละเอียด" ก่อนเพิ่มรายการยืม
        </p>
      </div>
    </section>
    <section class="py-5">
      <div class="container px-4 px-lg-5 mt-4">
        <div id="equipment-grid" class="row gx-4 gx-lg-5 row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 justify-content-center"></div>
      </div>
    </section>
    <footer class="py-5 bg-dark">
      <div class="container"><p class="m-0 text-center text-white">SIMSET Borrow MVP</p></div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/supabase.min.js"></script>
    <script src="template-js/scripts.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/catalog.js"></script>
  </body>
</html>
