<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>SIMSET Borrow - อุปกรณ์</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/simset-borrow.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container px-4 px-lg-5">
        <a class="navbar-brand" href="index.html">SIMSET Borrow</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
            <li class="nav-item"><a class="nav-link active" href="index.html">อุปกรณ์</a></li>
            <li class="nav-item"><a class="nav-link" href="track.html">ติดตามสถานะ</a></li>
          </ul>
          <a class="btn btn-brand" href="cart.html">
            <i class="bi-cart-fill me-1"></i>
            รายการยืม
            <span class="badge btn-brand-badge ms-1 rounded-pill" data-cart-count>0</span>
          </a>
        </div>
      </div>
    </nav>
    <header class="hero-borrow py-5">
      <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-white">
          <h1 class="display-4 fw-bolder">ระบบยืมอุปกรณ์</h1>
          <p class="lead fw-normal text-white-50 mb-0">เลือกอุปกรณ์ เพิ่มรายการยืม แล้วส่งคำขอให้เจ้าหน้าที่อนุมัติ</p>
        </div>
      </div>
    </header>
    <section class="py-4 border-bottom">
      <div class="container px-4 px-lg-5">
        <div class="d-flex flex-column flex-md-row borrow-toolbar">
          <input id="catalog-search" class="form-control" type="search" placeholder="ค้นหาชื่อหรือรหัสอุปกรณ์">
          <select id="catalog-type" class="form-select" style="max-width: 220px">
            <option value="all">ทุกประเภท</option>
            <option value="ผู้ใหญ่">ผู้ใหญ่</option>
            <option value="เด็ก">เด็ก</option>
            <option value="ทารก">ทารก</option>
            <option value="ทั่วไป">ทั่วไป</option>
          </select>
          <span id="catalog-count" class="text-muted align-self-center text-nowrap">0 รายการ</span>
        </div>
        <p class="recognition-hint catalog-recognition-hint mt-3 mb-0">
          ดูชื่ออุปกรณ์และจำนวนพร้อมยืมได้ทันที ถ้าต้องดูข้อมูลเพิ่มเติมให้กด “ดูรายละเอียด” ก่อนเพิ่มรายการยืม
        </p>
      </div>
    </section>
    <section class="py-5">
      <div class="container px-4 px-lg-5 mt-4">
        <div id="equipment-grid" class="row gx-4 gx-lg-5 row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 justify-content-center"></div>
      </div>
    </section>
    <footer class="py-5 bg-dark">
      <div class="container"><p class="m-0 text-center text-white">SIMSET Borrow MVP</p></div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/supabase.min.js"></script>
    <script src="template-js/scripts.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/catalog.js"></script>
  </body>
</html>
