<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>SIMSET Borrow - Receipt</title>
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/simset-borrow.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container px-4 px-lg-5">
        <a class="navbar-brand" href="index.html">SIMSET Borrow</a>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-dark" href="history.html">My history</a>
          <a class="btn btn-outline-dark" href="index.html">Catalog</a>
        </div>
      </div>
    </nav>
    <main class="py-5">
      <div class="container px-4 px-lg-5">
        <div class="row g-4">
          <div class="col-lg-8">
            <div class="bg-white border rounded p-4">
              <h1 class="h3">Borrow request submitted</h1>
              <p class="text-muted">Keep this confirmation for tracking and pickup coordination.</p>
              <div id="success-message" class="alert d-none"></div>
              <div id="receipt-content"></div>
              <div class="d-flex gap-2 mt-4">
                <button id="print-receipt" class="btn btn-dark" type="button">Print</button>
                <a id="track-link" class="btn btn-outline-dark" href="track.html">Track request</a>
              </div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="bg-white border rounded p-4 text-center">
              <h2 class="h5">Tracking QR</h2>
              <img id="tracking-qr" class="img-fluid my-3" alt="Tracking QR code">
              <p id="tracking-url" class="small text-muted text-break"></p>
              <button id="copy-tracking-url" class="btn btn-outline-secondary btn-sm" type="button">คัดลอกลิงก์</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/supabase.min.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/success.js"></script>
  </body>
</html>
