<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>SIMSET Borrow - KPI Report</title>
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/simset-borrow.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container px-4 px-lg-5">
        <a class="navbar-brand" href="report.html">SIMSET Report</a>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-dark" href="staff.html">Staff</a>
          <a class="btn btn-outline-dark" href="admin.html">Admin</a>
          <a class="btn btn-outline-dark" href="index.html">Catalog</a>
        </div>
      </div>
    </nav>
    <main class="py-5">
      <div class="container px-4 px-lg-5">
        <div class="d-flex justify-content-between align-items-start mb-4 gap-3 flex-wrap">
          <div>
            <h1 class="h2 mb-1">KPI Dashboard</h1>
            <p class="text-muted mb-0">ตัวชี้วัดหลักสำหรับหัวหน้าและทีมบริหารศูนย์</p>
          </div>
          <span class="admin-auth-state" id="report-auth-state">กำลังโหลดข้อมูล...</span>
        </div>
        <div id="report-message" class="alert d-none"></div>
        <section class="kpi-grid mb-4" aria-label="KPI summary">
          <article class="kpi-card is-primary"><span>รออนุมัติ</span><strong id="kpi-pending">0</strong></article>
          <article class="kpi-card is-primary"><span>OVERDUE</span><strong id="kpi-overdue">0</strong></article>
          <article class="kpi-card"><span>คืนตรงเวลา</span><strong id="kpi-ontime">0%</strong></article>
          <article class="kpi-card"><span>หุ่นพร้อมใช้</span><strong id="kpi-ready">0</strong></article>
        </section>
        <div class="report-grid">
          <section class="report-panel report-panel-primary">
            <h2 class="h4">จำนวน Order ต่อเดือน</h2>
            <div id="monthly-chart" class="monthly-chart"></div>
          </section>
          <section class="report-panel">
            <h2 class="h4">Top 5 หน่วยงานที่ยืมบ่อยสุด</h2>
            <ol id="top-departments" class="top-department-list"></ol>
          </section>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/supabase.min.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/report.js"></script>
  </body>
</html>
