<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SiMSET Admin — เข้าสู่ระบบ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="admin.css" />
</head>

<body class="login-body">
    <div class="login-bg">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <div>
                    <h1 class="login-title">SiMSET Admin</h1>
                    <p class="login-subtitle">ระบบจัดการหุ่นจำลองทางการแพทย์</p>
                </div>
            </div>

            <div class="login-alert" id="login-error" style="display:none">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                    <line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" />
                    <line x1="12" y1="16" x2="12.01" y2="16" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" />
                </svg>
                <span id="login-error-msg">อีเมล หรือรหัสผ่านไม่ถูกต้อง</span>
            </div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">อีเมล Admin</label>
                    <input id="email" type="email" class="form-input" placeholder="admin@simset.ac.th" required
                        autocomplete="email" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">รหัสผ่าน</label>
                    <div class="password-wrap">
                        <input id="password" type="password" class="form-input" placeholder="••••••••" required
                            autocomplete="current-password" />
                        <button type="button" class="pw-toggle" id="pw-toggle" title="แสดง/ซ่อนรหัสผ่าน">
                            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor"
                                    stroke-width="2" />
                                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="login-btn">
                    <span id="login-text">เข้าสู่ระบบ</span>
                    <div class="btn-spinner" id="btn-spinner" style="display:none"></div>
                </button>
            </form>

            <p class="login-note">🔒 เฉพาะผู้ดูแลระบบที่ได้รับสิทธิ์เท่านั้น</p>
        </div>
    </div>

    <script src="../vendor/supabase.min.js"
        integrity="sha384-YieCqqg9gQufX7+5HcFvCEg/n3KUEdl8/Jb+A6J0npf1mB740VayvwKjTrtCeUoy"
        crossorigin="anonymous"></script>
    <script>
        const SUPABASE_URL = 'https://ifogcvymwhcfbfjzhwsl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_DZyIDHVZ-kfD1o3baz0qmw_tTyRCJG8';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // If already logged in, redirect to dashboard
        sb.auth.getSession().then(({ data }) => {
            if (data.session) window.location.href = 'dashboard.html';
        });

        // Password toggle
        document.getElementById('pw-toggle').addEventListener('click', () => {
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        });

        // Login form submit
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('login-error');
            const btnSpinner = document.getElementById('btn-spinner');
            const btnText = document.getElementById('login-text');

            errEl.style.display = 'none';
            btnSpinner.style.display = 'block';
            btnText.style.display = 'none';
            document.getElementById('login-btn').disabled = true;

            const { error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                document.getElementById('login-error-msg').textContent = 'อีเมล หรือรหัสผ่านไม่ถูกต้อง กรุณาตรวจสอบอีกครั้ง';
                errEl.style.display = 'flex';
                btnSpinner.style.display = 'none';
                btnText.style.display = 'block';
                document.getElementById('login-btn').disabled = false;
            } else {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>

</html>
