<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SiMSET Admin — เข้าสู่ระบบ</title>
    <meta name="description" content="Login to SiMSET Admin Panel for medical manikin management." />

    <!-- SEO / Open Graph -->
    <meta property="og:title" content="SiMSET Admin Login" />
    <meta property="og:description" content="Secure login for manikin inventory management." />
    <meta property="og:type" content="website" />

    <!-- Stylesheets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="admin.css" />
</head>

<body class="login-body">
    <div class="login-bg">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <div>
                    <h1 class="login-title">SiMSET Admin</h1>
                    <p class="login-subtitle">ระบบจัดการหุ่นจำลองทางการแพทย์</p>
                </div>
            </div>

            <div class="login-alert" id="login-error" style="display:none">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                    <line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" />
                    <line x1="12" y1="16" x2="12.01" y2="16" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" />
                </svg>
                <span id="login-error-msg">อีเมล หรือรหัสผ่านไม่ถูกต้อง</span>
            </div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">อีเมล Admin</label>
                    <input id="email" type="email" class="form-input" placeholder="admin@simset.ac.th" required
                        autocomplete="email" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">รหัสผ่าน</label>
                    <div class="password-wrap">
                        <input id="password" type="password" class="form-input" placeholder="••••••••" required
                            autocomplete="current-password" />
                        <button type="button" class="pw-toggle" id="pw-toggle" title="แสดง/ซ่อนรหัสผ่าน">
                            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor"
                                    stroke-width="2" />
                                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="login-btn">
                    <span id="login-text">เข้าสู่ระบบ</span>
                    <div class="btn-spinner" id="btn-spinner" style="display:none"></div>
                </button>
            </form>

            <p class="login-note">🔒 เฉพาะผู้ดูแลระบบที่ได้รับสิทธิ์เท่านั้น</p>
        </div>
    </div>

    <script charset="utf-8" src="../vendor/supabase.min.js"
        integrity="sha384-YieCqqg9gQufX7+5HcFvCEg/n3KUEdl8/Jb+A6J0npf1mB740VayvwKjTrtCeUoy"
        crossorigin="anonymous"></script>
    <script charset="utf-8" src="login.js"></script>
</body>

</html>
