<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>SIMSET Borrow - รายการยืม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/simset-borrow.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container px-4 px-lg-5">
        <a class="navbar-brand" href="index.html">SIMSET Borrow</a>
        <a class="btn btn-outline-dark" href="index.html">เลือกอุปกรณ์เพิ่ม</a>
      </div>
    </nav>
    <main class="py-5">
      <div class="container px-4 px-lg-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h1 class="h2 mb-1">รายการยืม</h1>
            <p class="text-muted mb-0">ตรวจรายการก่อนส่งคำขอ</p>
          </div>
          <strong id="cart-summary">0 รายการ</strong>
        </div>
        <div class="table-responsive">
          <table class="table">
            <thead><tr><th>อุปกรณ์</th><th>ประเภท</th><th>จำนวน</th><th class="text-end">จัดการ</th></tr></thead>
            <tbody id="cart-items"></tbody>
          </table>
        </div>
        <div class="d-flex justify-content-end gap-2">
          <a class="btn btn-outline-dark" href="index.html">กลับไปเลือกอุปกรณ์</a>
          <a class="btn btn-brand" href="checkout.html">ส่งคำขอยืม</a>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/supabase.min.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/cart.js"></script>
  </body>
</html>
