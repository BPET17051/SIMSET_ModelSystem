<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>SIMSET Borrow - ส่งคำขอยืม</title>
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/simset-borrow.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <main>
        <div class="py-4 text-center">
          <h1 class="h2">ส่งคำขอยืม</h1>
          <p class="lead">กรอกข้อมูลผู้ยืมและช่วงวันที่ใช้งาน</p>
        </div>
        <div class="row g-5">
          <div class="col-md-5 col-lg-4 order-md-last">
            <h4 class="d-flex justify-content-between align-items-center mb-3">
              <span>รายการยืม</span>
              <span id="checkout-count" class="badge bg-dark rounded-pill">0</span>
            </h4>
            <ul id="checkout-items" class="list-group mb-3"></ul>
          </div>
          <div class="col-md-7 col-lg-8">
            <form id="checkout-form" class="needs-validation" novalidate>
              <div id="checkout-message" class="alert d-none"></div>
              <div class="row g-3">
                <div class="col-sm-6">
                  <label class="form-label" for="borrower_name">ชื่อผู้ยืม</label>
                  <input id="borrower_name" name="borrower_name" class="form-control" required>
                </div>
                <div class="col-sm-6">
                  <label class="form-label" for="department">หน่วยงาน</label>
                  <input id="department" name="department" class="form-control" required>
                </div>
                <div class="col-sm-6">
                  <label class="form-label" for="borrower_email">อีเมล</label>
                  <input id="borrower_email" name="borrower_email" type="email" class="form-control">
                </div>
                <div class="col-sm-6">
                  <label class="form-label" for="phone">เบอร์โทร</label>
                  <input id="phone" name="phone" class="form-control">
                </div>
                <div class="col-sm-6">
                  <label class="form-label" for="start_date">วันที่ยืม</label>
                  <input id="start_date" name="start_date" type="date" class="form-control" required>
                </div>
                <div class="col-sm-6">
                  <label class="form-label" for="end_date">วันที่คืน</label>
                  <input id="end_date" name="end_date" type="date" class="form-control" required>
                </div>
                <div class="col-12">
                  <label class="form-label" for="purpose">วัตถุประสงค์</label>
                  <textarea id="purpose" name="purpose" class="form-control" rows="4" required></textarea>
                </div>
              </div>
              <hr class="my-4">
              <button class="w-100 btn btn-dark btn-lg" type="submit">ส่งคำขอยืม</button>
            </form>
          </div>
        </div>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/supabase.min.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/checkout.js"></script>
  </body>
</html>
